# ==========================================
# 1. Spring Boot 基础服务配置
# ==========================================
server.port=8080
spring.application.name=Aero-Note

# ==========================================
# 2. MySQL & MyBatis-Plus 配置 (骨架)
# ==========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 注意：这里的 3306 端口和 aero_note 库名要和你本地一致
spring.datasource.url=jdbc:mysql://localhost:3306/aero_note?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
# ⚠️ 请修改为你自己本机 MySQL 的密码！
spring.datasource.password=123456

# 【极客开关】在控制台打印底层执行的 SQL 语句，联调时极其好用
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ==========================================
# 3. MongoDB 配置 (血肉)
# ==========================================
# 格式: mongodb://账号:密码@IP:端口/数据库名?authSource=认证库
spring.mongodb.uri=mongodb://admin:password123@localhost:27017/aero_note?authSource=admin

# ==========================================
# 4. MinIO 配置 (自定义属性 - 皮肤)
# ==========================================
minio.endpoint=http://localhost:9000
minio.accessKey=admin123
minio.secretKey=admin123
minio.bucketName=aero-posts