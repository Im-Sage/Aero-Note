version: '3'
services:
  mongo:
    image: mongo:latest
    container_name: my-mongo
    ports:
      - "27017:27017" # 数据库连接端口
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123

  # Mongo Express 是一个轻量级的网页版管理工具，类似于 Navicat
  mongo-express:
    image: mongo-express:latest
    container_name: my-mongo-express
    ports:
      - "8081:8081" # 网页控制台端口
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_SERVER: mongo
    depends_on:
      - mongo

  minio:
    image: minio/minio:latest
    container_name: my-minio
    ports:
      - "9000:9000" # 给 Java 代码调用的 API 端口
      - "9001:9001" # 给浏览器看的可视化控制台端口
    environment:
      MINIO_ROOT_USER: admin123           # 账号 (AccessKey)
      MINIO_ROOT_PASSWORD: admin123 # 密码 (SecretKey)
    volumes:
      # 极度重要：将宿主机的 ./data 目录映射到容器的 /data 目录。
      # 这样哪怕容器被删了，文件依然安全躺在你服务器的硬盘里！
      - ./data:/data
    command: server /data --console-address ":9001"
